<!DOCTYPE html>

  <title>Lab 9</title>

  <style>
    button {
      margin: 3px;
    }

    button:hover {
      cursor: pointer;
    }

    #first-num,

      width: 60px;
    }

    output {
      border: 1px solid gray;

    main {
      width: 800px;
    }

    #error-btns {
      column-gap: 5px;

    <form>

        <legend>Error Calculator</legend>
        <input name="first-num" id="first-num" />
        <select name="operator" id="operator">
          <option>+</option>
          <option>-</option>
          <option>*</option>
          <option>/</option>
        </select>
        <input name="second-num" id="second-num" />
        <button id="calculate">Calculate</button>
        <br />
        <output></output>
      </fieldset>
    </form>

    <section id="error-btns">
      <button>Console Log</button>

  <script>
    
    let form = document.querySelector('form');
    form.addEventListener('submit', e => {
      e.preventDefault();
      let output = document.querySelector('output');
      let firstNum = document.querySelector('#first-num').value;
      let secondNum = document.querySelector('#second-num').value;
      let operator = document.querySelector('#operator').value;
      output.innerHTML = eval(`${firstNum} ${operator} ${secondNum}`);
    });

    let errorBtns = Array.from(document.querySelectorAll('#error-btns > button'));
    console.log(errorBtns.length);
    // Start your code here
    //Error
    let log_button = errorBtns[0];
      log_button.addEventListener('click', () => {
      console.log("I'm a log!");
    });
    //Error
    let error_button = errorBtns[1];
      error_button.addEventListener('click', () => {
      console.error("I'm an error!");
    });
    //Count
    let count_button = errorBtns[2];
    var count = 0;
      count_button.addEventListener('click', () => {
      console.log("Current count: " + count);
      count += 1;
    });
    //Warn
    let warn_button = errorBtns[3];
      warn_button.addEventListener('click', () => {
      console.warn("I'm a warning!");
    });
    //Assert
    let assert_button = errorBtns[4];
      assert_button.addEventListener('click', () => {
      console.assert(count == count + 1,"This will never be true!");
    });
    //Clear
    let clear_button = errorBtns[5];
      clear_button.addEventListener('click', () => {
      console.clear();
    });
    //Dir

      dir_button.addEventListener('click', () => {
       console.dir(error_button);

    group_start_button.addEventListener('click', () => {
      console.group('Totally legit group');
    });
    //Group End
    let group_end_button = errorBtns[9];
    group_end_button.addEventListener('click', () => {
      console.groupEnd();
    });
    //Console Table
    let vals = ["I just", "want to", "let you", "know you're", "mine"];
    let table_button = errorBtns[10];
    table_button.addEventListener('click', () => {
      console.table(vals);
    });
    //Start Timer
    let start_timer_button = errorBtns[11];
    start_timer_button.addEventListener('click', () => {
      console.time('the one timer');
    });
    //End timer
    let end_timer_button = errorBtns[12];
    end_timer_button.addEventListener('click', () => {
      console.timeEnd('the one timer');
    });
    //Console Trace
    function real_function_iswear() {
      console.trace("in da func");
    }
    let trace_button = errorBtns[13];
    trace_button.addEventListener('click', () => {
      real_function_iswear();
    });

    global_error_button.addEventListener('click', () => {
